name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
      mobile_source: ${{ steps.filter.outputs.mobile_source }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            web:
              - 'app-nextjs/**'
              - '.github/workflows/ci.yml'
            mobile:
              - 'mobile/**'
              - '.github/workflows/ci.yml'
            mobile_source:
              - 'mobile/src/**'
              - 'mobile/**/*.ts'
              - 'mobile/**/*.tsx'
              - 'mobile/**/*.js'
              - 'mobile/**/*.jsx'

  backend:
    name: Backend – lint & test
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://localhost:5432/db?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm test -- --passWithNoTests

  web:
    name: Web (app-nextjs) – lint & build
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.web == 'true'
    defaults:
      run:
        working-directory: app-nextjs
    env:
      DATABASE_URL: postgresql://localhost:5432/db?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: app-nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  mobile:
    name: Mobile – lint & test
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.mobile == 'true'
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        if: github.event_name != 'pull_request' || needs.changes.outputs.mobile_source == 'true'
        run: npm run lint

      - name: Type-check
        if: github.event_name != 'pull_request' || needs.changes.outputs.mobile_source == 'true'
        run: npm run type-check

      - name: Test
        run: npm test -- --passWithNoTests
