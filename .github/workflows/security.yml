name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  audit-backend:
    name: Dependency audit – backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  audit-web:
    name: Dependency audit – web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-nextjs
    env:
      DATABASE_URL: postgresql://localhost:5432/db?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: app-nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect secrets with git-secrets patterns
        run: |
          # Check for common secret patterns
          if git log --all --full-history -- '*.env' | grep -q "^commit"; then
            echo "Warning: .env files found in git history"
          fi
          # Scan for potential secrets in source files
          if grep -rE "(password|secret|api_key|apikey|token)\s*=\s*['\"][^'\"]{8,}" \
            --include="*.ts" --include="*.js" --include="*.tsx" --include="*.jsx" \
            --exclude-dir=node_modules --exclude-dir=.git .; then
            echo "Warning: Potential hardcoded secrets detected"
          fi
          echo "Secret scan complete"
        continue-on-error: true
